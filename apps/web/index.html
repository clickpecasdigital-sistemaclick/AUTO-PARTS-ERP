<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon-32.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Auto Parts ERP — Gestão completa para Autopeças" />
    <meta name="theme-color" content="#11181C" />
    <script>
      // Aplica o tema ANTES do React montar — sem isso, toda navegação /
      // recarregamento mostrava um flash de tela branca até o
      // ThemeProvider rodar seu useEffect.
      (function () {
        var saved = localStorage.getItem('autocore-erp-theme');
        var isDark = saved ? saved === 'dark' : true; // padrão: escuro
        document.documentElement.classList.toggle('dark', isDark);
      })();
    </script>
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AutoParts" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>Auto Parts ERP</title>

    <!-- Tipografia do Design System (Sprint 03): Inter (corpo/UI) + Lexend (display/KPIs) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lexend:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
