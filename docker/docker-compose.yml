version: '3.9'

# =============================================================================
# Auto Parts ERP — Docker Compose Enterprise (Sprint 14)
#
# Serviços:
#   api      — NestJS API (port 3000)
#   web      — Vite/React via Nginx (port 80)
#   redis    — Cache + Filas (port 6379, interno)
#   worker   — Queue worker (BullMQ, mesmo image que api)
#
# Banco: Supabase (externo — gerenciado)
# Storage: Supabase Storage (externo)
#
# Uso:
#   Desenvolvimento: docker compose --profile dev up
#   Produção:       docker compose --profile prod up -d
# =============================================================================

x-api-env: &api-env
  NODE_ENV: ${NODE_ENV:-production}
  DATABASE_URL: ${DATABASE_URL}
  DIRECT_URL: ${DIRECT_URL}
  SUPABASE_URL: ${SUPABASE_URL}
  SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
  SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
  JWT_SECRET: ${JWT_SECRET}
  JWT_EXPIRY: ${JWT_EXPIRY:-15m}
  REFRESH_TOKEN_EXPIRY: ${REFRESH_TOKEN_EXPIRY:-30d}
  AES_256_KEY: ${AES_256_KEY}
  REDIS_URL: redis://redis:6379
  CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
  IP_WHITELIST: ${IP_WHITELIST:-127.0.0.1}
  APP_VERSION: ${APP_VERSION:-1.0.0}

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    image: autocore-erp-api:${APP_VERSION:-latest}
    restart: unless-stopped
    env_file: .env
    environment:
      <<: *api-env
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health/liveness"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - autocore-internal
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    image: autocore-erp-web:${APP_VERSION:-latest}
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      - api
    networks:
      - autocore-internal
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-autocore-redis} --maxmemory 256mb --maxmemory-policy allkeys-lru --save 900 1 --save 300 10 --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - autocore-internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-autocore-redis}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 384M

  # NOTA: o serviço `worker` (fila de jobs em background via BullMQ) foi
  # removido desta revisão. O compose apontava para `dist/workers/main.js`,
  # mas não existe nenhum `src/workers` no código, nem `bullmq`/`ioredis`
  # nas dependências da API — o container entraria em crash-loop. Quando o
  # processamento assíncrono for implementado de fato, reintroduza este
  # serviço apontando para o entrypoint real.

volumes:
  redis-data:
    driver: local

networks:
  autocore-internal:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
